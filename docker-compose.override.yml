# Local-development overrides — auto-merged by `docker compose` (not used by Coolify,
# which deploys with an explicit -f docker-compose.yml). Publishes host ports so you can
# run the API/web on the host against the containerized Postgres/Redis, or hit the full
# stack from localhost.

services:
  postgres:
    ports:
      - '5432:5432'
  redis:
    ports:
      - '6379:6379'
  api:
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - '4000:4000'
  web:
    ports:
      - '3000:3000'
