name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: concentrate-quiz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run coverage
      - name: E2E (Playwright)
        run: |
          npx playwright install --with-deps chromium
          npm run db:seed
          npm run test:e2e
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/concentrate-quiz
          REDIS_URL: redis://localhost:6379

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    # Job-level env so the step-level `if` can actually see it.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push API image (GHCR)
        run: |
          IMG=ghcr.io/${{ github.repository }}-api
          docker build --target api -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"
      - name: Build & push web image (GHCR)
        run: |
          IMG=ghcr.io/${{ github.repository }}-web
          docker build --target web -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"
      - name: Mirror to Docker Hub (only if configured)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          for svc in api web; do
            docker tag "ghcr.io/${{ github.repository }}-$svc:latest" "$DOCKERHUB_USERNAME/concentrate-school-portal-$svc:latest"
            docker push "$DOCKERHUB_USERNAME/concentrate-school-portal-$svc:latest"
          done
