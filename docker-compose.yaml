# Full-stack deployment: web + api + postgres + redis, all from the root Dockerfile.
# No host ports are published here (Coolify/its proxy exposes the web service via
# SERVICE_FQDN). For local development, docker-compose.override.yml adds host ports.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: concentrate-quiz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/concentrate-quiz
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_URL: ${APP_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-haiku-4-5
      API_PORT: '4000'

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        API_ORIGIN: http://api:4000
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SERVICE_FQDN_WEB_3000: ''
      API_ORIGIN: http://api:4000

volumes:
  postgres_data:
  redis_data:
